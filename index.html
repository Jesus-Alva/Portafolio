<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jesús Alva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
    <link href="css/style.css" rel="style">
    <style>
      .banner-image{
        background-image: url('img/banner-teclado.jpeg');
        background-size: cover;
      }

    </style>
  </head>

  <body>
    <!--Navbar-->
      <nav class="navbar fixed-top navbar-expand-lg navbar-dark p-md-3">
        <div class="container">
          <a href="#" class="navbar-brand">
            <img src="img/jab.PNG" width="60px">
          </a>
          <button 
          type="button"
          class="navbar-toggler"
          data-bs-target="#navbarNav"
          data-bs-toggle="collapse"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle Navbar"
          >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="mx-auto"></div>
            <ul class="navbar-nav">
                <li class="nav-item"><a href="#" class="nav-link text-white">Sobre Mi</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-white">Portafolio</a></li>
                <li class="nav-item"><a href="#" class="nav-link text-white">Contacto</a></li>
            </ul>
        </div>

        </div>
      </nav>
      <!--BANNER IMAGE-->
      <div class="banner-image w-100 vh-100 d-flex justify-content-center align-items-center">
        <div class="content text-center">
            <img src="img/Nombre-sf.png">
        </div>
      </div>
      <!--MAIN CONTENT AREA-->
      <div class="container my-5 d-grid gap-5">
        <div class="p-5 border">
          
        </div>
      </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa" crossorigin="anonymous"></script>
    <script>
        var nav = document.querySelector('nav');

        window.addEventListener('scroll', function(){
            if(window.pageYOffset > 100){
                nav.classList.add('bg-dark', 'shadow');
            }else{
                nav.classList.remove('bg-dark', 'shadow');
            }
        });
    </script>
    </body>
</html>
